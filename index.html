<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Break Workout</title>
  <meta name="description" content="A personal workout timer that prompts exercises throughout your workday, tracks your daily log, and works offline as a single HTML file." />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2128;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --text: #f0f2f5;
    --muted: #6b7280;
    --success: #10b981;
    --warn: #f59e0b;
    --ring-size: 260px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  #mainApp {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 40px;
    gap: 28px;
    width: 100%;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 420px;
  }
  header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Ring timer ── */
  .ring-container {
    position: relative;
    width: var(--ring-size);
    height: var(--ring-size);
    flex-shrink: 0;
  }
  .ring-svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 8;
  }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.4s;
  }
  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .ring-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .ring-time {
    font-family: 'Space Mono', monospace;
    font-size: 52px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .ring-sublabel {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── Exercise card ── */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 16px;
    padding: 24px 28px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .exercise-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .exercise-card.active::before { opacity: 1; }

  .ex-category {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 8px;
  }
  .ex-name {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ex-note {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    padding: 12px 28px;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    padding: 12px 18px;
    border: 1px solid var(--surface2);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 24px;
    justify-content: center;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── Queue ── */
  .queue-section {
    width: 100%;
    max-width: 420px;
  }
  .queue-title {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .queue-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .queue-item {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .queue-item.next {
    border-color: var(--accent);
    color: var(--text);
  }
  .queue-item .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--surface2);
    min-width: 20px;
  }
  .queue-item.next .q-num { color: var(--accent); }

  /* ── Settings panel ── */
  .settings-panel {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 16px;
    padding: 20px 24px;
    width: 100%;
    max-width: 420px;
    display: none;
  }
  .settings-panel.open { display: block; }
  .settings-panel h3 {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 12px;
  }
  .setting-row label { font-size: 13px; color: var(--text); }
  .setting-row input[type=range] {
    accent-color: var(--accent);
    flex: 1;
  }
  .setting-row span {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    min-width: 40px;
    text-align: right;
  }

  /* ── Log day tabs ── */
  .log-days {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .log-day-tab {
    font-size: 11px; font-family: 'Space Mono', monospace;
    background: var(--surface); border: 1px solid var(--surface2);
    color: var(--muted); border-radius: 6px; padding: 5px 10px;
    cursor: pointer; transition: all 0.15s;
  }
  .log-day-tab:hover { border-color: var(--muted); color: var(--text); }
  .log-day-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .log-day-tab .tab-count { font-size: 9px; opacity: 0.7; margin-left: 4px; }

  /* ── Notification banner ── */
  .notification {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: #fff;
    padding: 14px 28px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.04em;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .notification.show { transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }

  /* ── Done button ── */
  .btn-done {
    background: var(--success);
    color: #fff;
    font-size: 14px;
    padding: 12px 28px;
  }
  .btn-done:hover { background: #34d399; transform: translateY(-1px); }
  .btn-done:active { transform: translateY(0); }
  .btn-done:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* ── Daily log ── */
  .log-section {
    width: 100%;
    max-width: 420px;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .log-title {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .log-clear {
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Space Grotesk', sans-serif;
  }
  .log-clear:hover { color: var(--text); }
  .log-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 260px;
    overflow-y: auto;
  }
  .log-item {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .log-item-left { display: flex; align-items: center; gap: 10px; }
  .log-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-name { color: var(--text); }
  .log-time { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .log-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 14px 0; }
  .log-detail { font-size: 10px; color: var(--muted); margin-left: 6px; }

  /* ── Workout input modal ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 20px;
    padding: 28px 24px;
    width: 90%; max-width: 380px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal h3 {
    font-size: 16px; font-weight: 700; color: var(--text);
  }
  .modal-exercise-name {
    font-size: 12px; color: var(--accent2); letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: -8px;
  }
  .modal-fields { display: flex; flex-direction: column; gap: 12px; }
  .modal-field { display: flex; flex-direction: column; gap: 5px; }
  .modal-field label { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .modal-field input {
    background: var(--surface2);
    border: 1px solid #2a2d35;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ── Exercise editor ── */
  .editor-section {
    width: 100%; max-width: 420px;
  }
  .editor-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .editor-title {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
  }
  .editor-list { display: flex; flex-direction: column; gap: 5px; max-height: 320px; overflow-y: auto; }
  .editor-item {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
  }
  .editor-item-cat {
    font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600;
    white-space: nowrap; color: #fff;
  }
  .editor-item-name { flex: 1; color: var(--text); }
  .editor-item-note { font-size: 11px; color: var(--muted); flex: 1; }
  .editor-btn-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 15px; padding: 2px 5px; border-radius: 4px; line-height: 1;
    font-family: 'Space Grotesk', sans-serif;
  }
  .editor-btn-del:hover { color: #f43f5e; }
  .editor-add-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }
  .editor-add-row input, .editor-add-row select {
    background: var(--surface2);
    border: 1px solid #2a2d35;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
  }
  .editor-add-row input:focus, .editor-add-row select:focus { border-color: var(--accent); }
  .editor-add-row select option { background: var(--surface2); }
  .editor-add-btn {
    grid-column: 1 / -1;
    background: var(--accent); color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 13px;
    padding: 9px; border: none; border-radius: 8px; cursor: pointer;
  }
  .editor-add-btn:hover { background: var(--accent2); }

  /* ── Manual log picker ── */
  .picker-search {
    background: var(--surface2);
    border: 1px solid #2a2d35;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
  }
  .picker-search:focus { border-color: var(--accent); }
  .picker-list {
    display: flex; flex-direction: column; gap: 4px;
    max-height: 220px; overflow-y: auto; margin-top: 4px;
  }
  .picker-item {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text);
    transition: border-color 0.12s;
  }
  .picker-item:hover { border-color: var(--accent); }
  .picker-item.done-today { opacity: 0.45; }
  .picker-item.done-today::after { content: '✓'; color: var(--success); margin-left: auto; font-size: 11px; }

  /* ── Log again button on log entries ── */
  .log-again {
    background: none; border: 1px solid var(--surface2);
    color: var(--muted); font-size: 10px;
    padding: 2px 7px; border-radius: 20px; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    margin-left: 6px; white-space: nowrap;
  }
  .log-again:hover { border-color: var(--accent); color: var(--accent2); }

  .log-del, .history-del {
    background: none; border: none; color: var(--muted);
    font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
    flex-shrink: 0; transition: color 0.15s; opacity: 0.6;
  }
  .log-del:hover, .history-del:hover { color: #f43f5e; opacity: 1; }

  /* ── History modal ── */
  .history-day {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .history-day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer;
    transition: background 0.15s;
  }
  .history-day-header:hover { background: var(--surface2); }
  .history-day-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .history-day-meta { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .history-day-entries {
    display: none; flex-direction: column; gap: 1px;
    border-top: 1px solid var(--surface2);
  }
  .history-day-entries.open { display: flex; }
  .history-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; font-size: 13px;
    border-bottom: 1px solid var(--surface2);
  }
  .history-entry:last-child { border-bottom: none; }
  .history-entry-name { flex: 1; color: var(--text); }
  .history-entry-detail { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .history-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px; }
  .history-list { max-height: 65vh; overflow-y: auto; }
</style>
</head>
<body>

<!-- Auth screen -->
<div id="authScreen" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px">
  <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.02em">Work Break Workout</h1>
  <div style="background:var(--surface);border:1px solid var(--surface2);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px">
    <div id="authTitle" style="font-size:16px;font-weight:700;color:var(--text)">Sign in</div>
    <div id="authError" style="font-size:12px;color:#f43f5e;display:none"></div>
    <input id="authEmail" type="email" placeholder="Email" style="background:var(--surface2);border:1px solid #2a2d35;border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;padding:11px 13px;outline:none;width:100%" />
    <input id="authPassword" type="password" placeholder="Password" style="background:var(--surface2);border:1px solid #2a2d35;border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;padding:11px 13px;outline:none;width:100%" />
    <button id="authSubmitBtn" style="background:var(--accent);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;padding:12px;border:none;border-radius:10px;cursor:pointer">Sign in</button>
    <button id="authToggleBtn" style="background:none;border:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;cursor:pointer;padding:4px">No account? Sign up</button>
  </div>
</div>

<!-- Main app -->
<div id="mainApp" style="display:none;width:100%">

<header>
  <h1>Work Break Workout</h1>
  <button onclick="sb.auth.signOut()" style="background:none;border:1px solid var(--surface2);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer">Sign out</button>
</header>

<!-- Ring timer -->
<div class="ring-container">
  <svg class="ring-svg" viewBox="0 0 260 260">
    <circle class="ring-track" cx="130" cy="130" r="118"/>
    <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="118"/>
  </svg>
  <div class="ring-inner">
    <span class="ring-label" id="ringLabel">next exercise in</span>
    <span class="ring-time" id="ringTime">30:00</span>
    <span class="ring-sublabel" id="ringSubLabel">press start</span>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="statDone">0</div>
    <div class="stat-label">Done today</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="statRemaining">—</div>
    <div class="stat-label">Remaining</div>
  </div>
</div>

<!-- Exercise card -->
<div class="exercise-card" id="exerciseCard">
  <div class="ex-category" id="exCategory">Strength</div>
  <div class="ex-name" id="exName">Ready?</div>
  <div class="ex-note" id="exNote">Hit Start to begin your session</div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn-done" id="btnDone" onclick="doneExercise()" disabled>✓ Done</button>
  <button class="btn-ghost" onclick="skipExercise()">Skip →</button>
  <button class="btn-ghost" onclick="toggleSettings()">⚙ Settings</button>
  <button class="btn-ghost" onclick="toggleEditor()">✎ Exercises</button>
  <button class="btn-ghost" onclick="openHistory()">📅 History</button>
  <button class="btn-ghost" onclick="openManualLog()">＋ Log</button>
</div>

<!-- Settings -->
<div class="settings-panel" id="settingsPanel">
  <h3>Settings</h3>
  <div class="setting-row">
    <label>Break interval</label>
    <input type="range" id="intervalSlider" min="10" max="60" value="30" step="5" oninput="updateInterval(this.value)">
    <span id="intervalVal">30 min</span>
  </div>
  <div class="setting-row">
    <label>Rest duration</label>
    <input type="range" id="restSlider" min="1" max="300" value="30" step="1" oninput="updateRest(this.value)">
    <span id="restVal">30 sec</span>
  </div>
  <div class="setting-row">
    <label>Shuffle exercises</label>
    <input type="checkbox" id="shuffleCheck" checked onchange="rebuildQueue();saveState()">
  </div>
  <div class="setting-row">
    <label style="color:#f43f5e">Reset today</label>
    <button onclick="resetDay()" style="background:#f43f5e;color:#fff;font-size:12px;padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600">Reset</button>
  </div>
</div>

<!-- Queue -->
<div class="queue-section">
  <div class="queue-title">Up next</div>
  <div class="queue-list" id="queueList"></div>
</div>

<!-- Daily log -->
<div class="log-section">

async function syncLogToDB(entry) {
  if (!currentUser) return;
  try {
    await sb.from('workout_log').insert({
      user_id: currentUser.id,
      exercise_name: entry.name,
      category: entry.category,
      how: entry.how,
      reps: entry.detail?.reps || null,
      sets: entry.detail?.sets || null,
      weight: entry.detail?.weight || null,
      logged_at: new Date().toISOString()
    });
  } catch(e) { console.error('DB sync error:', e); }
}

async function loadLogsFromDB() {
  if (!currentUser) return;

    const today = new Date(); today.setHours(0,0,0,0);
    const { data, error } = await sb.from('workout_log')
      .select('*')
      .eq('user_id', currentUser.id)
      .gte('logged_at', today.toISOString())
      .order('logged_at', { ascending: false });

    // Merge DB entries into dailyLog (DB is source of truth)

      time: new Date(r.logged_at).toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit', hour12: false }),

    streak = dailyLog.filter(e => e.how !== 'skip').length;
    document.getElementById('statDone').textContent = streak;
    syncQueueWithLog();
    renderLog();
  } catch(e) { console.error('DB load error:', e); }
}

const CIRCUMFERENCE = 2 * Math.PI * 118;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const BUCKET_ORDER = ['Cardio', 'Pushing', 'Pulling', 'Legs', 'Core', 'Back', 'Mobility', 'Grip', 'Skill'];

// Seeded random using today's date — same shuffle every time you open the app today
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function seededShuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function buildDailyQueue() {
  // Each day gets a unique but consistent shuffle — same order if you reopen today
  const rng = seededRandom(getTodaySeed());

  const buckets = {};
  BUCKET_ORDER.forEach(cat => {
    buckets[cat] = seededShuffle(EXERCISES.filter(e => e.category === cat), rng);
  });

  const result = [];
  let remaining = [...BUCKET_ORDER];
  while (remaining.length > 0) {
    const roundOrder = seededShuffle(remaining, rng);
    const stillRemaining = [];
    for (const cat of roundOrder) {
      if (buckets[cat].length > 0) {
        result.push(buckets[cat].shift());
        if (buckets[cat].length > 0) stillRemaining.push(cat);
      }
    }
    remaining = stillRemaining;
  }
  return result;
}

function rebuildQueue() {
  const doShuffle = document.getElementById('shuffleCheck').checked;
  queue = doShuffle ? buildDailyQueue() : [...EXERCISES];
  currentIdx = 0;
  updateExerciseDisplay();
  renderQueue();
  updateDayProgress();
}

function updateDayProgress() {
  const remaining = queue.length - currentIdx;
  document.getElementById('statRemaining').textContent = remaining > 0 ? remaining : '✓';
}

function updateRing(secondsLeft, total) {
  const progress = secondsLeft / total;
  const offset = CIRCUMFERENCE * (1 - progress);
  const ring = document.getElementById('ringProgress');
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = offset;

  // Color shifts as time runs out
  if (progress > 0.5) ring.style.stroke = '#3b82f6';
  else if (progress > 0.25) ring.style.stroke = '#f59e0b';
  else ring.style.stroke = '#f43f5e';
}

function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function tick() {
  const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
  const remaining = totalSeconds - elapsed;

  document.getElementById('ringTime').textContent = formatTime(Math.max(0, remaining));
  updateRing(Math.max(0, remaining), totalSeconds);

  if (remaining <= 0) {
    triggerExercise();
  }
}

// Re-sync timer display when tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  if (timerStartTime) {
    const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
    if (elapsed >= totalSeconds) {
      clearInterval(timerInterval);
      triggerExercise();
    }
  }
});

// ── Service Worker za notifikacije kad je ekran zagašen ──
const SW_CODE = `
self.addEventListener('message', e => {
  if (e.data && e.data.type === 'NOTIFY') {
    self.registration.showNotification(e.data.title, {
      body: e.data.body,
      icon: '',
      badge: '',
      vibrate: [200, 100, 200],
      tag: 'workout',
      renotify: true
    });
  }
});
self.addEventListener('notificationclick', e => { e.notification.close(); });
`;

let swRegistration = null;

async function initServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const blob = new Blob([SW_CODE], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    swRegistration = await navigator.serviceWorker.register(swUrl, { scope: './' });
  } catch(e) {}
}

function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') initServiceWorker();
    });
  } else if (Notification.permission === 'granted') {
    initServiceWorker();
  }
}

function sendNotification(title, body) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  // Use SW if available (works with screen off), else fallback
  if (swRegistration && swRegistration.active) {
    swRegistration.active.postMessage({ type: 'NOTIFY', title, body });
  } else {
    try { new Notification(title, { body }); } catch(e) {}
  }
}

function getAllDayKeys() {
  try {
    return Object.keys(localStorage)
      .filter(k => /^wbw_\d{8}$/.test(k))
      .sort().reverse();
  } catch(e) { return [TODAY_KEY]; }
}

function keyToLabel(key) {
  const seed = parseInt(key.replace('wbw_', ''));
  if (isNaN(seed)) return key;
  const y = Math.floor(seed / 10000);
  const m = Math.floor((seed % 10000) / 100);
  const d = seed % 100;
  const date = new Date(y, m - 1, d);
  if (seed === getTodaySeed()) return 'Today';
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const ySeed = yesterday.getFullYear() * 10000 + (yesterday.getMonth() + 1) * 100 + yesterday.getDate();
  if (seed === ySeed) return 'Yesterday';
  return date.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
}

function renderLogDays() {
  const keys = getAllDayKeys();
  if (!keys.includes(TODAY_KEY)) keys.unshift(TODAY_KEY);
  const container = document.getElementById('logDays');
  if (keys.length <= 1) { container.innerHTML = ''; return; }
  container.innerHTML = keys.map(key => {
    let count = 0;
    try {
      const raw = localStorage.getItem(key);
      if (raw) count = (JSON.parse(raw).log || []).filter(e => e.how !== 'skip').length;
    } catch(e) {}
    return `<button class="log-day-tab${key === viewingDay ? ' active' : ''}" onclick="switchDay('${key}')">
      ${keyToLabel(key)}<span class="tab-count">${count > 0 ? count : ''}</span>
    </button>`;
  }).join('');
}

function switchDay(key) {
  viewingDay = key;
  renderLogDays();
  renderLogForKey(key);
}

function renderLog() {
  renderLogDays();
  renderLogForKey(viewingDay || TODAY_KEY);
}

  const isToday = key === TODAY_KEY;
  list.innerHTML = log.map(entry => {
    const color = CATEGORY_COLORS[entry.category] || '#60a5fa';
    const skipped = entry.how === 'skip';
    const isManual = entry.how === 'manual';
    const d = entry.detail;

    let detailHtml = '';

      if (d.reps) parts.push(d.sets > 1 ? `${d.sets}×${d.reps}` : d.reps);
      if (d.weight > 0) parts.push(`${d.weight}kg`);
      if (parts.length) detailHtml += `<span class="log-detail">${parts.join(' · ')}</span>`;
    }
    const skipTag = skipped ? '<span style="color:var(--muted);font-size:10px;margin-left:6px">skipped</span>' : '';
    const manualTag = isManual ? '<span style="color:var(--muted);font-size:10px;margin-left:4px">manual</span>' : '';
    const againBtn = isToday && !skipped ? `<button class="log-again" data-exname="${entry.name.replace(/"/g,'&quot;')}" onclick="logAgain(this.dataset.exname)">+ set</button>` : '';
    const delBtn = isToday ? `<button class="log-del" onclick="deleteLogEntry(${log.indexOf(entry)})" title="Delete">×</button>` : '';

    return `<div class="log-item">
      <div class="log-item-left" style="flex:1;flex-wrap:wrap;gap:4px">
        <div class="log-dot" style="background:${color}"></div>
        <span class="log-name">${entry.name}</span>
        ${skipTag}${manualTag}${detailHtml}${againBtn}
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span class="log-time">${entry.time}</span>
        ${delBtn}
      </div>
    </div>`;
  }).join('');
}

async function resetDay() {
  if (!confirm('Reset today? This will clear all logs for today and restore the full exercise queue.')) return;

  // Delete today's logs from Supabase
  if (currentUser) {
    try {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      await sb.from('workout_log')
        .delete()
        .eq('user_id', currentUser.id)
        .gte('logged_at', today.toISOString());
    } catch(e) { console.error('reset error:', e); }
  }

  // Clear local state
  dailyLog = [];
  streak = 0;
  currentIdx = 0;
  document.getElementById('statDone').textContent = 0;
  saveState();

  // Rebuild queue fresh
  rebuildQueue();
  syncQueueWithLog();
  updateExerciseDisplay();
  renderQueue();
  renderLog();
  updateDayProgress();
  startCountdown();

  notify('Day reset ✓');
}

function clearLog() {
  if (viewingDay !== TODAY_KEY) return;
  dailyLog = [];
  streak = 0;
  document.getElementById('statDone').textContent = 0;
  saveState();
  renderLog();
}


async function deleteLogEntry(idx) {
  const entry = dailyLog[idx];
  if (!entry) return;
  // Remove from DB by matching user_id + exercise_name + time
  if (currentUser) {
    try {
      const loggedAt = new Date();
      const [h, m] = entry.time.split(':');
      loggedAt.setHours(parseInt(h), parseInt(m), 0, 0);
      // Delete the most recent matching row (same name, same minute)
      const from = new Date(loggedAt.getTime() - 60000).toISOString();
      const to = new Date(loggedAt.getTime() + 60000).toISOString();
      await sb.from('workout_log')
        .delete()
        .eq('user_id', currentUser.id)
        .eq('exercise_name', entry.name)
        .gte('logged_at', from)
        .lte('logged_at', to);
    } catch(e) { console.error('delete error:', e); }
  }
  dailyLog.splice(idx, 1);
  streak = dailyLog.filter(e => e.how !== 'skip').length;
  document.getElementById('statDone').textContent = streak;
  saveState();
  renderLog();
}

function doneExercise() {
  clearInterval(timerInterval);

  openWorkoutModal(ex, (detail) => {
    notify(`✓ Done — ${ex.name}`);
    addToLog(ex, 'done', detail);
    streak++;
    document.getElementById('statDone').textContent = streak;
    saveState();

    // Brief rest before next exercise countdown
    document.getElementById('ringLabel').textContent = 'rest';
    document.getElementById('ringTime').textContent = formatTime(restSeconds);
    document.getElementById('ringSubLabel').textContent = 'next up soon…';
    document.getElementById('ringProgress').style.stroke = '#10b981';
    document.getElementById('exerciseCard').classList.remove('active');

    startRest(() => {
      currentIdx++;
      saveState();
      updateDayProgress();
      if (currentIdx >= queue.length) {
        showAllDone();
        return;
      }
      updateExerciseDisplay();
      renderQueue();
      startCountdown();
    });
  });
}

function startCountdown() {
  // Calculate seconds remaining in the current interval window since 06:00
  const now = new Date();
  const start = new Date(now); start.setHours(6, 0, 0, 0);
  if (now < start) start.setDate(start.getDate() - 1); // before 6am — use yesterday's 6am
  const secondsSinceAnchor = Math.floor((now - start) / 1000);
  const intervalSec = intervalMinutes * 60;
  const secondsIntoWindow = secondsSinceAnchor % intervalSec;
  const remaining = intervalSec - secondsIntoWindow;

  totalSeconds = intervalSec;
  timerStartTime = Date.now() - (secondsIntoWindow * 1000); // backdate start so elapsed is correct
  document.getElementById('ringLabel').textContent = 'next exercise in';
  document.getElementById('ringSubLabel').textContent = 'keep working!';
  document.getElementById('exerciseCard').classList.remove('active');
  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
  updateRing(remaining, totalSeconds);
  document.getElementById('ringTime').textContent = formatTime(remaining);
  document.getElementById('btnDone').disabled = false;
}

function startRest(onComplete) {
  restStartTime = Date.now();
  clearInterval(restInterval);
  document.getElementById('ringLabel').textContent = 'rest';
  document.getElementById('ringSubLabel').textContent = 'catch your breath';
  updateRing(restSeconds, restSeconds);
  document.getElementById('ringTime').textContent = formatTime(restSeconds);

  restInterval = setInterval(() => {
    const restElapsed = Math.floor((Date.now() - restStartTime) / 1000);
    const remaining = restSeconds - restElapsed;
    document.getElementById('ringTime').textContent = formatTime(Math.max(0, remaining));
    updateRing(Math.max(0, remaining), restSeconds);
    if (remaining <= 0) {
      clearInterval(restInterval);
      restStartTime = null;
      onComplete();
    }
  }, 1000);
}

function showAllDone() {
  clearInterval(timerInterval);
  clearInterval(restInterval);
  sessionActive = false;
  document.getElementById('btnDone').disabled = true;
  document.getElementById('ringLabel').textContent = 'all done!';
  document.getElementById('ringTime').textContent = '🎉';
  document.getElementById('ringSubLabel').textContent = 'come back tomorrow';
  document.getElementById('ringProgress').style.stroke = '#10b981';
  document.getElementById('exName').textContent = 'All exercises done!';
  document.getElementById('exNote').textContent = "You've completed every exercise for today. See you tomorrow.";
  document.getElementById('exCategory').textContent = 'Complete';
  document.getElementById('queueList').innerHTML = '<div class="queue-item" style="justify-content:center;color:var(--success)">Nothing left for today ✓</div>';
}

function autoStart() {
  requestNotificationPermission();
  sessionActive = true;
  if (queue.length === 0) rebuildQueue();
  updateExerciseDisplay();
  renderQueue();
  startCountdown();
}

// Midnight reset — rebuild queue and clear today's state when day rolls over
function scheduleMidnightReset() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const msUntilMidnight = midnight - now;
  setTimeout(() => {
    dailyLog = [];
    streak = 0;
    currentIdx = 0;
    document.getElementById('statDone').textContent = 0;
    rebuildQueue();
    updateExerciseDisplay();
    renderQueue();
    renderLog();
    updateDayProgress();
    startCountdown();
    scheduleMidnightReset(); // schedule next day
  }, msUntilMidnight);
}

function triggerExercise() {
  clearInterval(timerInterval);
  timerStartTime = null;
  const ex = queue[currentIdx % queue.length];

  notify(`⚡ ${ex.name}`);
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  playBeep();
  sendNotification('Time to exercise! ⚡', ex.name + ' — ' + ex.note);

  // Show exercise, wait for user to press Done
  document.getElementById('ringLabel').textContent = 'exercise time!';
  document.getElementById('ringTime').textContent = 'GO!';
  document.getElementById('ringSubLabel').textContent = 'press Done when finished';
  document.getElementById('ringProgress').style.stroke = '#10b981';
  document.getElementById('exerciseCard').classList.add('active');
}

function skipExercise() {
  const ex = queue[currentIdx % queue.length];
  addToLog(ex, 'skip');
  clearInterval(timerInterval);
  currentIdx++;
  saveState();
  updateDayProgress();
  notify('Skipped →');
  if (currentIdx >= queue.length) {
    showAllDone();
    return;
  }
  updateExerciseDisplay();
  renderQueue();
  startCountdown();
}

function updateExerciseDisplay() {
  const ex = queue[currentIdx % queue.length];
  if (!ex) return;
  document.getElementById('exCategory').textContent = ex.category;
  document.getElementById('exCategory').style.color = CATEGORY_COLORS[ex.category] || '#60a5fa';
  document.getElementById('exName').textContent = ex.name;
  document.getElementById('exNote').textContent = ex.note;
}

function renderQueue() {
  const list = document.getElementById('queueList');
  list.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const idx = (currentIdx + i) % queue.length;
    const ex = queue[idx];
    if (!ex) continue;
    const div = document.createElement('div');
    div.className = 'queue-item' + (i === 0 ? ' next' : '');
    div.innerHTML = `<span class="q-num">${i === 0 ? '▶' : String(i + 1).padStart(2,'0')}</span>${ex.name}`;
    list.appendChild(div);
  }
}

function updateInterval(val) {
  intervalMinutes = parseInt(val);
  document.getElementById('intervalVal').textContent = val + ' min';
  if (!sessionActive) {
    document.getElementById('ringTime').textContent = formatTime(intervalMinutes * 60);
    updateRing(1, 1);
  }
  saveState();
}

function updateRest(val) {
  restSeconds = parseInt(val);
  const label = restSeconds >= 60
    ? (restSeconds % 60 === 0 ? (restSeconds / 60) + ' min' : Math.floor(restSeconds / 60) + 'm ' + (restSeconds % 60) + 's')
    : restSeconds + ' sec';
  document.getElementById('restVal').textContent = label;
  saveState();
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

function notify(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach((t, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = i < 2 ? 880 : 1320;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.13);
    });
  } catch(e) {}
}

// ── Workout input modal ──
let _pendingModalCallback = null;
let _pendingModalEx = null;

function openWorkoutModal(ex, callback) {
  _pendingModalEx = ex;
  _pendingModalCallback = callback;
  document.getElementById('modalExName').textContent = ex.name;
  document.getElementById('modalReps').value = '';
  document.getElementById('modalSets').value = '1';
  document.getElementById('modalWeight').value = '';
  document.getElementById('workoutModal').classList.add('open');
  setTimeout(() => document.getElementById('modalReps').focus(), 100);
}

function closeWorkoutModal(save) {
  document.getElementById('workoutModal').classList.remove('open');
  if (!_pendingModalCallback) return;
  let detail = null;
  if (save) {
    const reps = document.getElementById('modalReps').value.trim();
    const sets = parseInt(document.getElementById('modalSets').value) || 1;
    const weight = parseFloat(document.getElementById('modalWeight').value) || 0;
    detail = { reps, sets, weight };
  }
  _pendingModalCallback(detail);
  _pendingModalCallback = null;
  _pendingModalEx = null;
}


// ── Exercise editor ──
function toggleEditor() {
  const sec = document.getElementById('editorSection');
  const open = sec.style.display === 'none' || sec.style.display === '';
  sec.style.display = open ? 'block' : 'none';
  if (open) renderEditorList();
}

function renderEditorList() {
  const list = document.getElementById('editorList');
  list.innerHTML = EXERCISES.map((ex, i) => {
    const color = CATEGORY_COLORS[ex.category] || '#60a5fa';
    return `<div class="editor-item">
      <span class="editor-item-cat" style="background:${color}">${ex.category}</span>
      <span class="editor-item-name">${ex.name}</span>
      <span class="editor-item-note">${ex.note}</span>
      <button class="editor-btn-del" onclick="deleteExercise(${i})" title="Remove">✕</button>
    </div>`;
  }).join('');
}

function deleteExercise(i) {
  EXERCISES.splice(i, 1);
  saveExercises();
  renderEditorList();
  rebuildQueue();
}

function addExercise() {
  const name = document.getElementById('newExName').value.trim();
  const cat = document.getElementById('newExCat').value;
  const note = document.getElementById('newExNote').value.trim() || '—';
  if (!name) { document.getElementById('newExName').focus(); return; }
  EXERCISES.push({ name, category: cat, note });
  saveExercises();
  document.getElementById('newExName').value = '';
  document.getElementById('newExNote').value = '';
  renderEditorList();
  rebuildQueue();
  notify(`+ ${name} added`);
}

// ── History ──
function openHistory() {
  renderHistory();
  document.getElementById('historyModal').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyModal').classList.remove('open');
}

async function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '<div class="history-empty">Loading…</div>';

  let allEntries = [];
  if (currentUser) {
    try {
      const { data } = await sb.from('workout_log')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('logged_at', { ascending: false });
      if (data) allEntries = data.map(r => ({
        id: r.id,
        name: r.exercise_name,
        category: r.category,
        how: r.how,
        detail: (r.reps || r.sets || r.weight) ? { reps: r.reps, sets: r.sets, weight: r.weight } : null,
        date: new Date(r.logged_at)
      }));
    } catch(e) {}
  }

  // Fall back to localStorage if DB empty
  if (allEntries.length === 0) {
    const keys = getAllDayKeys();
    keys.forEach(key => {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return;
        const log = JSON.parse(raw).log || [];
        const seed = parseInt(key.replace('wbw_', ''));
        const y = Math.floor(seed / 10000), m = Math.floor((seed % 10000) / 100), d = seed % 100;
        log.forEach(e => allEntries.push({ ...e, date: new Date(y, m-1, d) }));
      } catch(e) {}
    });
  }

  if (allEntries.length === 0) {
    list.innerHTML = '<div class="history-empty">No history yet</div>';
    return;
  }

  // Group by date
  const byDay = {};
  allEntries.forEach(e => {
    const d = e.date;
    const key = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(e);
  });

  const days = Object.keys(byDay).sort().reverse();
  list.innerHTML = days.map((dayKey, di) => {
    const entries = byDay[dayKey];
    const done = entries.filter(e => e.how !== 'skip').length;
    const skipped = entries.filter(e => e.how === 'skip').length;
    const y = Math.floor(dayKey / 10000), m = Math.floor((dayKey % 10000) / 100), d = dayKey % 100;
    const date = new Date(y, m-1, d);
    const todaySeed = getTodaySeed();
    let label;
    if (parseInt(dayKey) === todaySeed) label = 'Today';
    else {
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      const ySeed = yest.getFullYear()*10000 + (yest.getMonth()+1)*100 + yest.getDate();
      label = parseInt(dayKey) === ySeed ? 'Yesterday'
        : date.toLocaleDateString('en', { weekday: 'long', month: 'short', day: 'numeric' });
    }
    const meta = `${done} done${skipped ? `, ${skipped} skipped` : ''}`;
    const entryRows = entries.map(e => {
      const color = CATEGORY_COLORS[e.category] || '#60a5fa';
      const det = e.detail;
      let detStr = '';
      if (det) {
        const parts = [];
        if (det.reps) parts.push(det.sets > 1 ? `${det.sets}×${det.reps}` : det.reps);
        if (det.weight > 0) parts.push(`${det.weight}kg`);
        detStr = parts.join(' · ');
      }
      const skipTag = e.how === 'skip' ? '<span style="color:var(--muted);font-size:10px;margin-left:4px">skipped</span>' : '';
      const entryIdx = entries.indexOf(e);
      const delBtn = `<button class="history-del" data-dbid="${e.id || ''}" data-daykey="${dayKey}" data-idx="${entryIdx}" onclick="deleteHistoryEntry(this)" title="Delete">×</button>`;
      return `<div class="history-entry">
        <div class="log-dot" style="background:${color};flex-shrink:0"></div>
        <span class="history-entry-name">${e.name}${skipTag}</span>
        ${detStr ? `<span class="history-entry-detail">${detStr}</span>` : ''}
        ${delBtn}
      </div>`;
    }).join('');

    return `<div class="history-day">
      <div class="history-day-header" onclick="toggleHistoryDay('hday-${di}')">
        <span class="history-day-title">${label}</span>
        <span class="history-day-meta">${meta}</span>
      </div>
      <div class="history-day-entries${di === 0 ? ' open' : ''}" id="hday-${di}">${entryRows}</div>
    </div>`;
  }).join('');
}

function toggleHistoryDay(id) {
  document.getElementById(id).classList.toggle('open');
}

async function deleteHistoryEntry(btn) {
  const dbId = btn.dataset.dbid;
  const dayKey = btn.dataset.daykey;
  const idx = parseInt(btn.dataset.idx);

  // Delete from Supabase if we have an id
  if (currentUser && dbId) {
    try {
      await sb.from('workout_log').delete().eq('id', dbId).eq('user_id', currentUser.id);
    } catch(e) { console.error('history delete error:', e); }
  }

  // If today, also remove from dailyLog
  if ('wbw_' + dayKey === TODAY_KEY || dayKey === String(getTodaySeed())) {
    if (idx >= 0 && idx < dailyLog.length) {
      dailyLog.splice(idx, 1);
      streak = dailyLog.filter(e => e.how !== 'skip').length;
      document.getElementById('statDone').textContent = streak;
      saveState();
      renderLog();
    }
  } else {
    // Remove from localStorage cache for that day
    try {
      const key = 'wbw_' + dayKey;
      const raw = localStorage.getItem(key);
      if (raw) {
        const data = JSON.parse(raw);
        data.log.splice(idx, 1);
        localStorage.setItem(key, JSON.stringify(data));
      }
    } catch(e) {}
  }

  btn.closest('.history-entry').remove();
}
function openManualLog() {
  document.getElementById('pickerSearch').value = '';
  filterPicker('');
  document.getElementById('manualLogModal').classList.add('open');
  setTimeout(() => document.getElementById('pickerSearch').focus(), 100);
}

function closeManualLog() {
  document.getElementById('manualLogModal').classList.remove('open');
}

function filterPicker(query) {
  const q = query.toLowerCase();
  // Names already done today (logged as 'done' or 'manual')
  const doneTodayNames = new Set(
    dailyLog.filter(e => e.how === 'done' || e.how === 'manual').map(e => e.name)
  );
  const matches = EXERCISES.filter(e => !q || e.name.toLowerCase().includes(q));
  const list = document.getElementById('pickerList');
  if (matches.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 4px">No matches</div>';
    return;
  }
  list.innerHTML = matches.map(ex => {
    const color = CATEGORY_COLORS[ex.category] || '#60a5fa';
    const done = doneTodayNames.has(ex.name);
    const safeName = ex.name.replace(/"/g, '&quot;');
    return `<div class="picker-item${done ? ' done-today' : ''}" data-exname="${safeName}">
      <span class="editor-item-cat" style="background:${color};font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;color:#fff;white-space:nowrap">${ex.category}</span>
      <span>${ex.name}</span>
    </div>`;
  }).join('');

  // Attach click handlers after rendering
  list.querySelectorAll('.picker-item').forEach(el => {
    el.addEventListener('click', () => selectManualExercise(el.dataset.exname));
  });
}

function selectManualExercise(name) {
  const ex = EXERCISES.find(e => e.name === name);
  if (!ex) return;
  closeManualLog();
  setTimeout(() => {
    openWorkoutModal(ex, (detail) => {
      console.log('modal callback fired, detail:', detail);
      addToLog(ex, 'manual', detail);
      console.log('after addToLog, dailyLog length:', dailyLog.length);
      removeFromQueue(ex.name);
      streak++;
      document.getElementById('statDone').textContent = streak;
      saveState();
      console.log('after saveState, checking localStorage:', localStorage.getItem(TODAY_KEY));
      notify(`✓ Logged — ${ex.name}`);
    });
  }, 150);
}

function logAgain(name) {
  const ex = EXERCISES.find(e => e.name === name);
  if (!ex) return;
  openWorkoutModal(ex, (detail) => {
    if (!detail) return;
    addToLog(ex, 'manual', detail);
    saveState();
    notify(`✓ Logged again — ${ex.name}`);
  });
}

function removeFromQueue(name) {
  // Remove ALL occurrences of this exercise from the queue at or after currentIdx
  let removed = false;
  for (let i = queue.length - 1; i >= currentIdx; i--) {
    if (queue[i].name === name) {
      queue.splice(i, 1);
      removed = true;
    }
  }
  if (removed) {
    updateDayProgress();
    renderQueue();
    updateExerciseDisplay();
  }
}

function syncQueueWithLog() {
  // Remove from queue any exercise already logged today as 'done' or 'manual'
  const doneNames = new Set(
    dailyLog.filter(e => e.how === 'done' || e.how === 'manual').map(e => e.name)
  );
  for (let i = queue.length - 1; i >= currentIdx; i--) {
    if (doneNames.has(queue[i].name)) {
      queue.splice(i, 1);
    }
  }
  updateDayProgress();
  renderQueue();
  updateExerciseDisplay();
}

// ── Init (called after auth) ──
function initApp() {
  loadSettings();
  rebuildQueue();
  loadState();
  syncQueueWithLog(); // remove already-done exercises from queue
  viewingDay = TODAY_KEY;
  updateExerciseDisplay();
  renderQueue();
  renderLog();
  updateDayProgress();

  updateRing(1, 1);
  document.getElementById('ringProgress').style.stroke = '#3b82f6';
  document.getElementById('ringProgress').style.strokeDasharray = CIRCUMFERENCE;
  document.getElementById('ringProgress').style.strokeDashoffset = 0;
  document.getElementById('ringTime').textContent = formatTime(intervalMinutes * 60);

  document.getElementById('modalSaveBtn').addEventListener('click', () => closeWorkoutModal(true));
  document.getElementById('modalSkipBtn').addEventListener('click', () => closeWorkoutModal(false));

  autoStart();
  scheduleMidnightReset();

  // Load today from DB (overrides localStorage), then full history
  loadLogsFromDB().then(() => loadHistoryFromDB());
}

// ── Boot ──
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initAuth);
} else {
  initAuth();
}
</script>
